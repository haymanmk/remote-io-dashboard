<svg xmlns="http://www.w3.org/2000/svg" viewBox="-56 -56 624 624" width="512" height="512">
  <!-- Solid Concept 2: IC chip silhouette — square body + thick solid pins on all sides -->

  <!-- No background — transparent outside the chip shape -->

  <!-- Pin bars — solid rectangles, left side -->
  <rect x="50"  y="174" width="120" height="52" rx="10" fill="#4da6ff"/>
  <rect x="50"  y="244" width="120" height="52" rx="10" fill="#4da6ff"/>
  <rect x="50"  y="314" width="120" height="52" rx="10" fill="#4da6ff"/>

  <!-- Pin bars — right side -->
  <rect x="342" y="174" width="120" height="52" rx="10" fill="#4da6ff"/>
  <rect x="342" y="244" width="120" height="52" rx="10" fill="#4da6ff"/>
  <rect x="342" y="314" width="120" height="52" rx="10" fill="#4da6ff"/>

  <!-- Pin bars — top -->
  <rect x="174" y="50"  width="52" height="120" rx="10" fill="#4da6ff"/>
  <rect x="244" y="50"  width="52" height="120" rx="10" fill="#4da6ff"/>
  <rect x="314" y="50"  width="52" height="120" rx="10" fill="#4da6ff"/>

  <!-- Pin bars — bottom -->
  <rect x="174" y="342" width="52" height="120" rx="10" fill="#4da6ff"/>
  <rect x="244" y="342" width="52" height="120" rx="10" fill="#4da6ff"/>
  <rect x="314" y="342" width="52" height="120" rx="10" fill="#4da6ff"/>

  <!-- Chip body — solid square, covers pin roots -->
  <rect x="152" y="152" width="208" height="208" rx="24" fill="#1a6fff"/>

  <!-- "IO" cutout inside chip as negative space -->
  <text x="256" y="285" font-family="Arial Black, sans-serif" font-size="88" font-weight="900"
        fill="#0d1b2a" text-anchor="middle" dominant-baseline="middle">IO</text>
</svg>
