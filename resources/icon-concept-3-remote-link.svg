<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 3: "Remote Link" — two nodes connected by a network arc, one cloud one chip -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001428"/>
      <stop offset="100%" style="stop-color:#002040"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0088cc"/>
    </linearGradient>
    <linearGradient id="chip3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#cc4400"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="248" fill="url(#bg3)" stroke="#00d4ff" stroke-width="5"/>

  <!-- Curved connection line between nodes -->
  <path d="M150,256 C150,150 362,150 362,256" fill="none" stroke="#00d4ff" stroke-width="5" stroke-dasharray="14,8" opacity="0.7"/>
  <!-- Animated-looking data packets on the path -->
  <circle cx="200" cy="185" r="8" fill="#00d4ff" opacity="0.9"/>
  <circle cx="256" cy="165" r="6" fill="#00d4ff" opacity="0.6"/>
  <circle cx="312" cy="185" r="8" fill="#00d4ff" opacity="0.9"/>

  <!-- Left node: Cloud / Host computer -->
  <rect x="68" y="208" width="164" height="96" rx="18" ry="18" fill="#001428" stroke="#00d4ff" stroke-width="4"/>
  <!-- Screen lines -->
  <rect x="84" y="224" width="132" height="8" rx="4" fill="#00d4ff" opacity="0.4"/>
  <rect x="84" y="240" width="100" height="8" rx="4" fill="#00d4ff" opacity="0.25"/>
  <rect x="84" y="256" width="116" height="8" rx="4" fill="#00d4ff" opacity="0.35"/>
  <rect x="84" y="272" width="80" height="8" rx="4" fill="#00d4ff" opacity="0.2"/>
  <!-- Label -->
  <text x="150" y="320" font-family="monospace" font-size="18" fill="#00d4ff" text-anchor="middle" opacity="0.9">HOST</text>
  <!-- Node dot -->
  <circle cx="232" cy="256" r="10" fill="#00d4ff"/>

  <!-- Right node: STM32 chip -->
  <rect x="280" y="200" width="164" height="112" rx="14" ry="14" fill="#0a0a00" stroke="#ff6b35" stroke-width="4"/>
  <!-- Chip detail -->
  <rect x="296" y="216" width="132" height="80" rx="8" ry="8" fill="#1a0a00" stroke="#ff6b35" stroke-width="2"/>
  <text x="362" y="250" font-family="monospace" font-size="22" font-weight="bold" fill="#ff6b35" text-anchor="middle">STM</text>
  <text x="362" y="272" font-family="monospace" font-size="15" fill="#ff6b3588" text-anchor="middle">32</text>
  <!-- Chip mini pins right -->
  <line x1="428" y1="220" x2="444" y2="220" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
  <line x1="428" y1="234" x2="444" y2="234" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
  <line x1="428" y1="248" x2="444" y2="248" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
  <line x1="428" y1="262" x2="444" y2="262" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
  <line x1="428" y1="276" x2="444" y2="276" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
  <!-- Chip mini pins left -->
  <line x1="280" y1="220" x2="264" y2="220" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
  <line x1="280" y1="234" x2="264" y2="234" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
  <line x1="280" y1="248" x2="264" y2="248" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
  <!-- Node dot -->
  <circle cx="280" cy="256" r="10" fill="#ff6b35"/>

  <!-- TCP label on the arc -->
  <text x="256" y="142" font-family="monospace" font-size="18" fill="#00d4ff" text-anchor="middle" opacity="0.7">TCP</text>

  <!-- Status LED dots bottom -->
  <circle cx="210" cy="400" r="10" fill="#00ff88"/>
  <text x="226" y="406" font-family="monospace" font-size="16" fill="#00ff88" opacity="0.8">CONNECTED</text>
</svg>
