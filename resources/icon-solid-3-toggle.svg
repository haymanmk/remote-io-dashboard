<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Solid Concept 3: Toggle switch — universal ON metaphor, clean at any size -->

  <!-- Background disc -->
  <circle cx="256" cy="256" r="256" fill="#12001e"/>

  <!-- Toggle track — wide pill shape -->
  <rect x="64" y="186" width="384" height="140" rx="70" fill="#3d1a5e"/>

  <!-- Toggle knob — right position = ON -->
  <circle cx="372" cy="256" r="90" fill="#c44dff"/>

  <!-- Small highlight on knob for depth -->
  <circle cx="348" cy="230" r="28" fill="#e080ff" opacity="0.5"/>

  <!-- "I" indicator on the knob (ON state) -->
  <rect x="360" y="220" width="24" height="72" rx="12" fill="#12001e"/>

  <!-- "O" indicator on the track left side -->
  <circle cx="152" cy="256" r="32" fill="none" stroke="#3d1a5e" stroke-width="18"/>
  <!-- Make O visible against dark track -->
  <circle cx="152" cy="256" r="32" fill="none" stroke="#6a2a8a" stroke-width="16"/>
</svg>
