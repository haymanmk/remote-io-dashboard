<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 1: "Circuit Node" — chip with IO pins and signal arcs -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#1a3a4a"/>
    </linearGradient>
    <linearGradient id="chip1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c896"/>
      <stop offset="100%" style="stop-color:#00a878"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg1)" stroke="#00c896" stroke-width="6"/>

  <!-- Center chip body -->
  <rect x="160" y="160" width="192" height="192" rx="20" ry="20" fill="url(#chip1)" opacity="0.15" stroke="#00c896" stroke-width="4"/>
  <rect x="180" y="180" width="152" height="152" rx="12" ry="12" fill="#0a1a22" stroke="#00c896" stroke-width="2.5"/>

  <!-- IC label -->
  <text x="256" y="248" font-family="monospace" font-size="38" font-weight="bold" fill="#00c896" text-anchor="middle">IO</text>
  <text x="256" y="282" font-family="monospace" font-size="18" fill="#00c89688" text-anchor="middle">STM32</text>

  <!-- Left pins -->
  <line x1="100" y1="210" x2="180" y2="210" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="240" x2="180" y2="240" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="270" x2="180" y2="270" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="300" x2="180" y2="300" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <!-- Pin dots left -->
  <circle cx="100" cy="210" r="7" fill="#00c896"/>
  <circle cx="100" cy="240" r="7" fill="#00c896"/>
  <circle cx="100" cy="270" r="7" fill="#00c896"/>
  <circle cx="100" cy="300" r="7" fill="#00c896"/>

  <!-- Right pins -->
  <line x1="332" y1="210" x2="412" y2="210" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <line x1="332" y1="240" x2="412" y2="240" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <line x1="332" y1="270" x2="412" y2="270" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <line x1="332" y1="300" x2="412" y2="300" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <!-- Pin dots right -->
  <circle cx="412" cy="210" r="7" fill="#00c896"/>
  <circle cx="412" cy="240" r="7" fill="#00c896"/>
  <circle cx="412" cy="270" r="7" fill="#00c896"/>
  <circle cx="412" cy="300" r="7" fill="#00c896"/>

  <!-- Top pins -->
  <line x1="210" y1="100" x2="210" y2="180" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="100" x2="256" y2="180" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <line x1="302" y1="100" x2="302" y2="180" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <circle cx="210" cy="100" r="7" fill="#00c896"/>
  <circle cx="256" cy="100" r="7" fill="#00c896"/>
  <circle cx="302" cy="100" r="7" fill="#00c896"/>

  <!-- Bottom pins -->
  <line x1="210" y1="332" x2="210" y2="412" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="332" x2="256" y2="412" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <line x1="302" y1="332" x2="302" y2="412" stroke="#00c896" stroke-width="5" stroke-linecap="round"/>
  <circle cx="210" cy="412" r="7" fill="#00c896"/>
  <circle cx="256" cy="412" r="7" fill="#00c896"/>
  <circle cx="302" cy="412" r="7" fill="#00c896"/>
</svg>
