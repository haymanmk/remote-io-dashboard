<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Solid Concept 1: Power/IO symbol — filled, scales to 16px cleanly -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a1a"/>
      <stop offset="100%" style="stop-color:#0a160a"/>
    </linearGradient>
  </defs>

  <!-- Background disc -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Solid power ring — filled donut shape, notched at top -->
  <!-- Outer circle filled -->
  <circle cx="256" cy="290" r="170" fill="#22cc66"/>
  <!-- Inner hole cutout -->
  <circle cx="256" cy="290" r="90" fill="#0a160a"/>
  <!-- Top notch cutout (the gap in the ring) -->
  <rect x="208" y="80" width="96" height="160" fill="#0a160a"/>

  <!-- Vertical stem (the I bar) — solid pill -->
  <rect x="224" y="80" width="64" height="200" rx="32" ry="32" fill="#22cc66"/>

  <!-- Subtly darken the bg outside the circle to keep it crisp -->
  <circle cx="256" cy="256" r="256" fill="none"/>
</svg>
