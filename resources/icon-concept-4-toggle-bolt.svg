<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Concept 4: "Toggle Bolt" — bold power/IO toggle symbol with signal rings, minimal & sharp -->
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a2030"/>
    </linearGradient>
    <linearGradient id="ring4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#e08000"/>
    </linearGradient>
    <linearGradient id="bolt4" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe066"/>
      <stop offset="100%" style="stop-color:#ff9900"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="248" fill="url(#bg4)" stroke="#f0c040" stroke-width="5"/>

  <!-- Outer signal ring (broken arc for "open circuit" feel) -->
  <path d="M 256 50 A 206 206 0 1 1 140 100" fill="none" stroke="url(#ring4)" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
  <!-- Inner signal ring -->
  <path d="M 256 94 A 162 162 0 1 1 168 134" fill="none" stroke="#f0c04055" stroke-width="8" stroke-linecap="round"/>

  <!-- The gap in the arc has "I" and "O" text -->
  <text x="185" y="88" font-family="monospace" font-size="36" font-weight="bold" fill="#f0c040" text-anchor="middle">I</text>
  <text x="327" y="88" font-family="monospace" font-size="36" font-weight="bold" fill="#f0c040" text-anchor="middle">O</text>

  <!-- Power / IO symbol in center -->
  <!-- Vertical bar (the "I") -->
  <rect x="240" y="130" width="32" height="110" rx="16" ry="16" fill="url(#bolt4)"/>
  <!-- Arc (the "O") — break at top to form classic power symbol -->
  <path d="M 180 240 A 80 80 0 1 0 332 240" fill="none" stroke="url(#bolt4)" stroke-width="28" stroke-linecap="round"/>

  <!-- Radial tick marks (like a gauge) -->
  <line x1="256" y1="52" x2="256" y2="74" stroke="#f0c040" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="365" y1="80" x2="354" y2="98" stroke="#f0c040" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="430" y1="175" x2="411" y2="180" stroke="#f0c040" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="450" y1="290" x2="430" y2="286" stroke="#f0c040" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="82" y1="175" x2="101" y2="180" stroke="#f0c040" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="62" y1="290" x2="82" y2="286" stroke="#f0c040" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- "REMOTE IO" label at bottom -->
  <text x="256" y="410" font-family="monospace" font-size="22" font-weight="bold" fill="#f0c040" text-anchor="middle" letter-spacing="4" opacity="0.85">REMOTE IO</text>
  <!-- Bottom line -->
  <line x1="130" y1="420" x2="382" y2="420" stroke="#f0c040" stroke-width="2" opacity="0.3"/>
</svg>
